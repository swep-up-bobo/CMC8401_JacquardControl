name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt6
      uses: qt-actions/qt-actions@v3
      with:
        version: '6.10.2'
        components: qtbase

    - name: Configure CMake
      shell: bash
      run: |
        cmake -B build -G "MinGW Makefiles" \
          -DCMAKE_PREFIX_PATH="$Env:LOCALAPPDATA\Qt\Tools\mingw1310_64\lib\cmake"

    - name: Build
      shell: bash
      run: cmake --build build --parallel

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CMC8401_JacquardControl-Windows
        path: build/CMC8401_JacquardControl.exe
