name: Build Windows

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install Qt6
      uses: jurplel/qt-action@v3
      with:
        version: 6.10.2
        components: qtbase
        platforms: windows

    - name: Configure CMake
      run: |
        cmake -B build -G "MinGW Makefiles" -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"

    - name: Build
      run: cmake --build build --parallel

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: CMC8401_JacquardControl-Windows
        path: build/CMC8401_JacquardControl.exe
